{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Controls how much URL info is leaked in the Referer header on outbound
     navigations and subresources. Does not affect umami: its script reads
     document.referrer in JS and sends it in the request body, not the header. -->
<meta name="referrer" content="strict-origin-when-cross-origin">

<!-- Resolve the analytics origin's DNS early; the script itself is deferred and non-critical -->
<link rel="dns-prefetch" href="https://u.olicorne.org">

<!-- Speculation Rules: prefetch same-origin pages on hover/pointerdown so
     navigation feels instant. Ignored by browsers that don't support it. -->
<script type="speculationrules">
{
  "prefetch": [
    {
      "where": {
        "and": [
          { "href_matches": "/*" },
          { "not": { "href_matches": "/files/*" } },
          { "not": { "href_matches": "/assets/*" } }
        ]
      },
      "eagerness": "moderate"
    }
  ]
}
</script>

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- Set the theme before first paint to avoid a light/dark flash on reload.
     Mirrors determineComputedTheme() in assets/js/_main.js (three-state:
     "dark" / "light" / "system", where "system" follows the OS preference).
     Based on academicpages PR #3647 (fixes #3646), adapted for three states. -->
<script>
  (function () {
    try {
      var setting = localStorage.getItem("theme");
      if (setting !== "dark" && setting !== "light" && setting !== "system") {
        setting = "system";
      }
      var prefersDark = window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (setting === "dark" || (setting === "system" && prefersDark)) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    } catch (e) {}
  })();
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">

<!-- make sure the referer is in an appropriate format for umami
source: https://gist.github.com/ColourfulField/a40a7081414299e64930d2a7ff3069cc -->
<script>
    const queryParams = new URLSearchParams(window.location.search);
    function normalizeHostname(input) {
        // Remove protocol, www, and any path
        let hostname = input.replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0];

        // Remove invalid characters, keep only alphanumeric, dots, and hyphens
        hostname = hostname.replace(/[^a-zA-Z0-9.-]/g, '');

        // Ensure it starts and ends with alphanumeric
        hostname = hostname.replace(/^[^a-zA-Z0-9]+|[^a-zA-Z0-9]+$/g, '');

        if (!hostname.includes('http://')) {
            hostname = 'http://' + hostname;
        }

        return hostname;
    }

    var initialRef = document.referrer;
    Object.defineProperty(document, "referrer", {
        get:
            function () {
                let refFromQuery = queryParams.get('ref') || queryParams.get('referer') || queryParams.get('referrer') || queryParams.get('utm_source');
                refFromQuery = normalizeHostname(refFromQuery);
                let ref = refFromQuery || initialRef;
                console.log(ref);
                return ref;

            }
    });
</script>
