<!-- Accessible tables: kramdown emits <th> without a scope attribute. Add
     scope="col" to header-row cells and scope="row" to any leading row header
     so screen readers announce row and column relationships. No-op on pages
     with no tables. -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.page__content table').forEach(function (table) {
    table.querySelectorAll('thead th').forEach(function (th) {
      if (!th.hasAttribute('scope')) { th.setAttribute('scope', 'col'); }
    });
    table.querySelectorAll('tbody tr > th:first-child').forEach(function (th) {
      if (!th.hasAttribute('scope')) { th.setAttribute('scope', 'row'); }
    });
  });
});
</script>
